<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מרכז פיקוד — דקל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090d;
  --s1:#0b1018;
  --s2:#101620;
  --s3:#161e2a;
  --s4:#1d2635;
  --border:rgba(255,255,255,0.055);
  --border2:rgba(255,255,255,0.1);
  --text:#dde6f0;
  --muted:#6b8099;
  --dim:#334455;
  --accent:#2d72c8;
  --accent-glow:rgba(45,114,200,0.18);
  --gold:#c8a84b;
  --gold-dim:rgba(200,168,75,0.12);
  --gold-border:rgba(200,168,75,0.28);
  --green:#1db954;
  --green-dim:rgba(29,185,84,0.1);
  --green-border:rgba(29,185,84,0.28);
  --amber:#e09b35;
  --amber-dim:rgba(224,155,53,0.1);
  --red:#e04040;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* subtle radial glow at top */
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(45,114,200,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ━━━ LOGIN ━━━ */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
.login-emblem{
  width:64px;height:64px;border-radius:18px;overflow:hidden;
  margin-bottom:24px;
  border:1px solid var(--gold-border);
  box-shadow:0 0 0 4px var(--gold-dim),0 16px 48px rgba(0,0,0,0.6);
}
.login-emblem img{width:100%;height:100%;object-fit:cover;display:block}
.login-title{font-size:24px;font-weight:900;letter-spacing:-0.5px;color:var(--text);margin-bottom:3px}
.login-sub{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:32px;letter-spacing:0.3px}
.login-card{
  width:100%;max-width:320px;
  background:linear-gradient(160deg,var(--s2),var(--s1));
  border:1px solid var(--border2);border-radius:20px;
  padding:22px;
  box-shadow:0 24px 64px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04);
}
.field-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
.field-inp{
  width:100%;padding:12px 14px;
  background:var(--s3);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;
  direction:rtl;outline:none;transition:border-color .2s;margin-bottom:14px;
}
.field-inp:focus{border-color:var(--accent)}
.vis-row{
  display:flex;align-items:center;gap:10px;
  background:var(--s3);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;margin-bottom:18px;cursor:pointer;transition:.15s;user-select:none;
}
.vis-row:hover{background:var(--s4)}
.vis-row-text{flex:1;font-size:13px;font-weight:600;color:var(--muted)}
.pill-toggle{
  width:34px;height:19px;border-radius:10px;background:var(--s4);
  border:1px solid var(--border2);position:relative;transition:.2s;flex-shrink:0;
}
.pill-toggle::after{
  content:'';position:absolute;top:2px;right:2px;width:13px;height:13px;
  border-radius:50%;background:var(--dim);transition:.25s;
}
.pill-toggle.on{background:var(--accent);border-color:var(--accent)}
.pill-toggle.on::after{right:auto;left:2px;background:#fff}
.login-cta{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#2d72c8 0%,#1a4fa8 100%);
  color:#fff;font-family:'Heebo',sans-serif;font-size:15px;font-weight:900;
  cursor:pointer;letter-spacing:-0.2px;
  box-shadow:0 4px 20px rgba(45,114,200,0.4);transition:.15s;
}
.login-cta:active{transform:scale(.98);opacity:.9}

/* ━━━ TOPBAR ━━━ */
#topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;padding-top:max(10px,env(safe-area-inset-top));
  background:rgba(6,9,13,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);position:relative;z-index:100;flex-shrink:0;
}
.tb-emblem{
  width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0;
  border:1px solid var(--gold-border);
  box-shadow:0 0 12px var(--gold-dim);
}
.tb-emblem img{width:100%;height:100%;object-fit:cover;display:block}
.tb-center{flex:1;min-width:0}
.tb-title{font-size:14px;font-weight:900;letter-spacing:-0.3px;line-height:1.1}
.tb-sub{font-size:10px;font-weight:600;color:var(--muted);margin-top:1px}
.gold-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--gold-dim);border:1px solid var(--gold-border);
  border-radius:7px;padding:4px 9px;
  font-size:10px;font-weight:800;color:var(--gold);
  letter-spacing:0.4px;text-transform:uppercase;flex-shrink:0;
}
.live-clock{flex-shrink:0;text-align:center}
.clock-hm{font-size:17px;font-weight:900;letter-spacing:1.5px;font-variant-numeric:tabular-nums;line-height:1}
.clock-dt{font-size:9px;font-weight:600;color:var(--muted);margin-top:1px}

/* ━━━ STATS STRIP ━━━ */
#statsStrip{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;overflow-x:auto;
}
#statsStrip::-webkit-scrollbar{display:none}
.stat-cell{
  flex:1;min-width:80px;padding:10px 12px;
  border-left:1px solid var(--border);
  cursor:pointer;transition:.12s;
}
.stat-cell:first-child{border-left:none}
.stat-cell:active{background:var(--s2)}
.stat-num{font-size:20px;font-weight:900;letter-spacing:-0.5px;line-height:1;color:var(--text)}
.stat-lbl{font-size:9px;font-weight:700;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:4px}
.pulse-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pdot 1.8s ease-in-out infinite}
.pulse-dot.off{background:var(--dim);animation:none}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

/* ━━━ PRESENCE ━━━ */
#presBar{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  border-bottom:1px solid var(--border);background:var(--bg);
  flex-shrink:0;overflow-x:auto;min-height:34px;
}
#presBar::-webkit-scrollbar{display:none}
.pres-lbl{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.8px;flex-shrink:0}
.pres-pill{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;
  padding:3px 9px;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;
}
.pres-dot{width:5px;height:5px;border-radius:50%;background:var(--dim);flex-shrink:0}
.pres-pill.me{border-color:rgba(45,114,200,.35);color:var(--accent)}
.pres-pill.me .pres-dot{background:var(--accent);animation:pdot 1.8s infinite}
.pres-pill.cmd{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
.pres-pill.cmd .pres-dot{background:var(--gold)}

/* ━━━ NAV ━━━ */
#navBar{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;overflow-x:auto;
}
#navBar::-webkit-scrollbar{display:none}
.nav-t{
  flex:1;min-width:76px;padding:10px 6px;text-align:center;
  font-size:11px;font-weight:800;color:var(--muted);
  cursor:pointer;transition:.15s;border-bottom:2px solid transparent;
  white-space:nowrap;letter-spacing:0.2px;
}
.nav-t.on{color:var(--text);border-bottom-color:var(--accent)}

/* ━━━ SCROLL AREA ━━━ */
#mainWrap{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:1}
#scroll{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(90px,calc(76px + env(safe-area-inset-bottom)))}
#scroll::-webkit-scrollbar{width:3px}
#scroll::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

/* ━━━ SECTION HEADER ━━━ */
.sh{
  font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;
  letter-spacing:1.2px;display:flex;align-items:center;gap:8px;margin:18px 0 9px;
}
.sh:first-child{margin-top:0}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}

/* ━━━ WING CARD ━━━ */
.wc{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  margin-bottom:7px;overflow:hidden;transition:border-color .2s,box-shadow .2s;
  position:relative;
}
.wc.filled{border-color:rgba(45,114,200,.38);box-shadow:0 0 0 1px rgba(45,114,200,.12),0 4px 20px rgba(45,114,200,.08)}
.wc.done{background:linear-gradient(135deg,var(--s1),rgba(29,185,84,.06));border-color:var(--green-border);box-shadow:0 0 0 1px rgba(29,185,84,.1),0 4px 20px rgba(29,185,84,.06)}
.wc.busy{border-color:rgba(224,155,53,.42);background:rgba(224,155,53,.03)}
.wc.busy::before{content:'';position:absolute;inset:-1px;border-radius:14px;border:1.5px solid rgba(224,155,53,.45);animation:pulseborder 1.9s ease-in-out infinite;pointer-events:none}
@keyframes pulseborder{0%,100%{opacity:.3}50%{opacity:.95}}
.wc-main{display:flex;align-items:center;padding:12px 14px;gap:10px}
.wc-info{flex:1;min-width:0}
.wc-name{font-size:15px;font-weight:900;letter-spacing:-0.2px}
.wc-sub{font-size:10px;color:var(--amber);font-weight:700;margin-top:2px}
.wc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.wc-num{font-size:26px;font-weight:900;letter-spacing:-1px;color:var(--dim);min-width:44px;text-align:left;line-height:1}
.wc.filled .wc-num{color:var(--text)}
.wc.done .wc-num{color:var(--green)}
.wc-badge{
  width:28px;height:28px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.wc.done .wc-badge{border-color:var(--green-border);background:var(--green-dim)}
/* busy strip */
.busy-strip{
  display:none;align-items:center;gap:8px;
  padding:7px 14px 9px;border-top:1px solid rgba(224,155,53,.13);
}
.wc.busy .busy-strip{display:flex}
.busy-av{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#e09b35,#b87a20);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;flex-shrink:0;
}
.busy-nm{font-size:12px;font-weight:700;color:var(--amber)}
.busy-ac{font-size:11px;color:var(--muted)}
.typing{display:flex;gap:3px;align-items:center;margin-right:4px}
.typing span{width:4px;height:4px;border-radius:50%;background:var(--amber);opacity:.4;animation:typ 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.22s}.typing span:nth-child(3){animation-delay:.44s}
@keyframes typ{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-4px);opacity:1}}
.busy-bar{height:1.5px;background:rgba(224,155,53,.1);overflow:hidden}
.wc.busy .busy-bar{display:block}
.busy-bar-fill{height:100%;width:25%;background:linear-gradient(90deg,transparent,rgba(224,155,53,.85),transparent);animation:bscan 2.2s linear infinite}
@keyframes bscan{0%{transform:translateX(500%)}100%{transform:translateX(-500%)}}

/* ━━━ GEN ROW ━━━ */
.gr{
  display:flex;align-items:center;padding:11px 14px;
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  margin-bottom:6px;gap:10px;transition:.2s;
}
.gr.has-val{border-color:rgba(45,114,200,.28);background:rgba(45,114,200,.03)}
.gr-name{flex:1;font-size:14px;font-weight:700}
.gr-num{font-size:20px;font-weight:900;color:var(--dim)}
.gr.has-val .gr-num{color:var(--text)}

/* ━━━ LOG ━━━ */
.li{
  display:flex;gap:10px;padding:10px 0;
  border-bottom:1px solid var(--border);align-items:flex-start;
}
.li:last-child{border-bottom:none}
.li-who{font-size:11px;font-weight:800;color:var(--accent);flex-shrink:0;width:72px;padding-top:1px}
.li-what{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.li-when{font-size:10px;color:var(--dim);flex-shrink:0;white-space:nowrap;padding-top:2px}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:56px 20px;text-align:center;gap:14px;
}
.empty-state svg{color:var(--dim)}
.empty-title{font-size:16px;font-weight:900;color:var(--muted)}
.empty-sub{font-size:12px;font-weight:600;color:var(--dim);line-height:1.6}

/* ━━━ ARCHIVE ━━━ */
.arc{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  margin-bottom:8px;overflow:hidden;cursor:pointer;transition:.15s;
}
.arc:active{background:var(--s2)}
.arc-head{display:flex;align-items:center;gap:10px;padding:13px 14px}
.arc-name{font-size:15px;font-weight:900;flex:1}
.arc-total{font-size:24px;font-weight:900;color:var(--accent);letter-spacing:-0.5px}
.arc-meta{display:flex;gap:10px;flex-wrap:wrap;padding:0 14px 12px}
.arc-m{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);font-weight:600}
.arc-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.arc.open .arc-body{display:block}
.aw{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.aw:last-child{border-bottom:none}
.aw.done-w{color:var(--green)}
.aw-num{font-size:15px;font-weight:900}

/* ━━━ BOTTOM BAR ━━━ */
#bottomBar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(6,9,13,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);flex-shrink:0;position:relative;z-index:99;
}
.bb-b{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 12px;border-radius:12px;border:1px solid var(--border2);
  background:var(--s2);font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:.15s;flex:1;
}
.bb-b:active{background:var(--s3)}
.bb-b.gold-btn{
  background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold);
  box-shadow:0 4px 20px rgba(200,168,75,.15);flex:2;
}
.bb-b.gold-btn:active{background:rgba(200,168,75,.2)}

/* ━━━ ALERT DRAWER ━━━ */
#alertDrawer{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(6,9,13,.98);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--border2);padding:16px 14px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .32s cubic-bezier(.25,.46,.45,.94);
}
#alertDrawer.open{transform:translateY(0)}
.drawer-lbl{
  font-size:9px;font-weight:700;color:var(--gold);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.drawer-lbl::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--gold)}
.alert-row{display:flex;gap:8px;align-items:flex-end}
.alert-ta{
  flex:1;background:var(--s2);border:1.5px solid var(--border2);border-radius:12px;
  padding:11px 13px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;
  color:var(--text);direction:rtl;outline:none;resize:none;min-height:44px;max-height:88px;
  transition:border-color .2s;
}
.alert-ta:focus{border-color:var(--gold)}
.alert-go{
  width:44px;height:44px;flex-shrink:0;border:none;border-radius:12px;
  background:linear-gradient(135deg,#c8a84b,#9a7c30);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(200,168,75,.3);transition:.15s;color:#fff;
}
.alert-go:active{transform:scale(.93);opacity:.85}
.alert-note{font-size:10px;color:var(--dim);text-align:center;margin-top:8px;font-weight:600}
.drawer-cancel{
  display:block;width:100%;margin-top:10px;padding:11px;
  background:var(--s2);border:1px solid var(--border);border-radius:11px;
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  color:var(--muted);cursor:pointer;
}

/* ━━━ NO COUNT STATE ━━━ */
.no-count{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:16px}
.no-count-title{font-size:18px;font-weight:900;color:var(--muted)}
.no-count-sub{font-size:13px;color:var(--dim);font-weight:600;line-height:1.7;max-width:240px}

/* ━━━ RESPONSIVE ━━━ */
@media(min-width:768px){
  #scroll{padding:20px 24px;padding-bottom:100px}
  .wc-name{font-size:17px}.wc-num{font-size:30px}.stat-num{font-size:24px}
  .clock-hm{font-size:20px}.nav-t{font-size:12px;padding:12px 14px}
}
@media(min-width:1100px){
  body{flex-direction:row}
  #sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--s1);z-index:50}
  #topbar,#statsStrip,#presBar{border-right:none}
  .wc-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .wc-cols .sh{grid-column:1/-1}
  .wc-num{font-size:32px}.stat-num{font-size:28px}
}
@media(min-width:1600px){
  .wc-cols{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-emblem"><img id="ll" src="" alt=""></div>
  <div class="login-title">מרכז פיקוד</div>
  <div class="login-sub">בית סוהר דקל — גישת מפקד</div>
  <div class="login-card">
    <div class="field-lbl">שם המפקד</div>
    <input class="field-inp" id="nameInp" type="text" placeholder="הכנס שם..." maxlength="30" autocomplete="off">
    <div class="vis-row" onclick="toggleVis()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted)"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <div class="vis-row-text">גלוי לסוהרים</div>
      <div class="pill-toggle on" id="visPill"></div>
    </div>
    <button class="login-cta" onclick="doLogin()">כניסה למרכז פיקוד</button>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar" style="display:none">
  <div class="tb-emblem"><img id="tl" src="" alt=""></div>
  <div class="tb-center">
    <div class="tb-title">מרכז פיקוד</div>
    <div class="tb-sub" id="countLbl">בית סוהר דקל</div>
  </div>
  <div class="gold-chip">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span id="cmdName"></span>
  </div>
  <div class="live-clock">
    <div class="clock-hm" id="clkH">00:00</div>
    <div class="clock-dt" id="clkD"></div>
  </div>
</div>

<!-- STATS STRIP -->
<div id="statsStrip" style="display:none">
  <div class="stat-cell" onclick="goTab('wings')">
    <div class="stat-num" id="st0">0</div>
    <div class="stat-lbl"><span class="pulse-dot off" id="ldot"></span>סה״כ</div>
  </div>
  <div class="stat-cell" onclick="goTab('wings')">
    <div class="stat-num" id="st1">0</div>
    <div class="stat-lbl">אגפים ✓</div>
  </div>
  <div class="stat-cell" onclick="goTab('generals')">
    <div class="stat-num" id="st2">0</div>
    <div class="stat-lbl">ציבורי</div>
  </div>
  <div class="stat-cell" onclick="goTab('log')">
    <div class="stat-num" id="st3">0</div>
    <div class="stat-lbl">פעולות</div>
  </div>
</div>

<!-- PRESENCE -->
<div id="presBar" style="display:none">
  <span class="pres-lbl">מחוברים</span>
  <div id="presPills" style="display:flex;gap:6px;flex-wrap:nowrap;overflow:hidden"></div>
</div>

<!-- MAIN -->
<div id="mainWrap" style="display:none">
  <div id="navBar">
    <div class="nav-t on" onclick="goTab('wings')">אגפים</div>
    <div class="nav-t" onclick="goTab('generals')">ציבורי</div>
    <div class="nav-t" onclick="goTab('log')">לוג</div>
    <div class="nav-t" onclick="goTab('archive')">ארכיון</div>
  </div>
  <div id="scroll">
    <div id="tw"></div>
    <div id="tg" style="display:none"></div>
    <div id="tl" style="display:none"></div>
    <div id="ta" style="display:none"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottomBar" style="display:none">
  <button class="bb-b" onclick="toggleVisibility()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="visIco"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    <span id="visTxt">גלוי</span>
  </button>
  <button class="bb-b gold-btn" onclick="openAlert()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    שלח התראה לסוהרים
  </button>
</div>

<!-- ALERT DRAWER -->
<div id="alertDrawer">
  <div class="drawer-lbl">התראה חד-כיוונית — כל הסוהרים</div>
  <div class="alert-row">
    <textarea class="alert-ta" id="alertTa" placeholder="כתוב הודעה..." rows="1"></textarea>
    <button class="alert-go" onclick="sendAlert()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="alert-note">הסוהרים יראו באנר מיוחד — ללא אפשרות הגבה</div>
  <button class="drawer-cancel" onclick="closeAlert()">ביטול</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBSV1dq1NgIr92wLbDelT5K6LgsOL9NQVQ",
  authDomain:"dekel-prisoner-count-fcc36.firebaseapp.com",
  databaseURL:"https://dekel-prisoner-count-fcc36-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"dekel-prisoner-count-fcc36",
  storageBucket:"dekel-prisoner-count-fcc36.firebasestorage.app",
  messagingSenderId:"174981013586",
  appId:"1:174981013586:web:9e69e7ac42ddff46d4ff8b"
});
const db=firebase.database(), auth=firebase.auth();

const WINGS=[
  {id:'w1',name:'אגף 1'},{id:'w2',name:'אגף 2'},{id:'w3',name:'אגף 3'},
  {id:'w4',name:'אגף 4'},{id:'w5',name:'5+51'},{id:'w7',name:'7+71'},
  {id:'w8',name:'אגף 8'},{id:'w9',name:'אגף 9'},{id:'wm',name:'מכלול'},
  {id:'w12',name:'אגף 12'},{id:'w13',name:'אגף 13'}
];
const GENERALS=['מפעלים','חינוך','מדרשה','מטבח','קנטינה','מרפאה','בדק בית','אפסנאות','המתנות','ביקורים','שינוע מזון','עבודות רס״ר'];

const LOGO='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAFAAAABQCAYAAACOEfKtAAAfYElEQVR42u18eZRV1ZX3b59z733v1YTFUIKIohDBoqoQS8EJbhWDoRUVwQtqssygEttOOt2JY2J8vpg4oLZtbLsjnXQc4kBdBRzQKFJVT9AgBJWq4ilOWIoIBVJFTW+455z9/fHqkYIPDHP6+xZ7rVr11nv3nrvv7+x773cfoCN0hI7QETpCR+gIHaEjdISO0BE6QkfoCB2hI3SEjtAROkJH6AgdoSN0hI7QETpCR+gIHaEjdISO0BE6QkfoCB2hI3SEjtAROkJH6AgdoSN0hI7QETpCR+gIHaEjdISO0BE6QkfoCB2hI3SEjtAROkJH6AgdoSN0hI7QETpCR+gIHaEjdISO0BE6QkdoSwH4f6RZ9QsVAAAAJXRFWHRkYXRlOmNyZWF0ZQAyMDIzLTA3LTI4VDEyOjQ0OjU2KzAwOjAwkBJvXQAAACV0RVh0ZGF0ZTptb2RpZnkAMjAyMy0wNy0yOFQxMjo0NDo1NiswMDowMOFP1+EAAAAASUVORK5CYII=';
document.getElementById('ll').src=LOGO;
document.getElementById('tl').src=LOGO;

let cmdName='',isVis=true,curTab='wings';
let D={wings:{},general:{},activeStart:null,winglocks:{},customGenerals:[],operator:''};
let LOG=[],ARC=[],PRES={};

/* ── VISIBILITY ── */
function toggleVis(){isVis=!isVis;document.getElementById('visPill').classList.toggle('on',isVis);}

/* ── LOGIN ── */
document.getElementById('nameInp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
function doLogin(){
  const n=document.getElementById('nameInp').value.trim();
  if(!n){document.getElementById('nameInp').focus();return;}
  cmdName=n;isVis=document.getElementById('visPill').classList.contains('on');
  auth.signInAnonymously().then(()=>{
    ['loginScreen'].forEach(id=>document.getElementById(id).style.display='none');
    ['topbar','statsStrip','presBar','mainWrap','bottomBar'].forEach(id=>document.getElementById(id).style.display='flex');
    document.getElementById('cmdName').textContent=cmdName;
    document.getElementById('visTxt').textContent=isVis?'גלוי':'מוסתר';
    updateVisIcon();
    startListeners();
    startClock();
    if(isVis)writePresence();
  });
}

/* ── PRESENCE ── */
function pkey(){return('מפקד:'+cmdName).replace(/[.#$[\]]/g,'_')}
function writePresence(){db.ref('presence/'+pkey()).set({name:cmdName,commander:true,ts:Date.now()});db.ref('presence/'+pkey()).onDisconnect().remove();}
function removePresence(){db.ref('presence/'+pkey()).remove();}
function toggleVisibility(){
  isVis=!isVis;
  document.getElementById('visTxt').textContent=isVis?'גלוי':'מוסתר';
  updateVisIcon();
  if(isVis)writePresence();else removePresence();
}
function updateVisIcon(){
  document.getElementById('visIco').innerHTML=isVis
    ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

/* ── CLOCK ── */
function startClock(){
  function t(){
    const n=new Date();
    document.getElementById('clkH').textContent=n.toLocaleTimeString('he-IL',{timeZone:'Asia/Jerusalem',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('clkD').textContent=n.toLocaleDateString('he-IL',{timeZone:'Asia/Jerusalem',weekday:'short',day:'numeric',month:'short'});
  }
  t();setInterval(t,1000);
}

/* ── LISTENERS ── */
function startListeners(){
  db.ref('data').on('value',s=>{const d=s.val()||{};D.wings=d.wings||{};D.general=d.general||{};D.activeStart=d.activeStart||null;D.winglocks=d.winglocks||{};D.customGenerals=d.customGenerals||[];D.operator=d.operator||'';renderAll();});
  db.ref('log').on('value',s=>{LOG=s.val()||[];renderAll();});
  db.ref('archive').on('value',s=>{ARC=s.val()||[];renderAll();});
  db.ref('presence').on('value',s=>{PRES=s.val()||{};renderPres();});
}

/* ── HELPERS ── */
function wt(wid){const w=D.wings[wid]||{};if(w.useCell&&w.cells)return Object.values(w.cells).reduce((s,v)=>s+(parseInt(v)||0),0);return parseInt(w.direct)||0;}
function totAll(){return WINGS.reduce((s,w)=>s+wt(w.id),0);}
function totGen(){const g=[...GENERALS,...(D.customGenerals||[])];return g.reduce((s,k)=>s+(parseInt((D.general||{})[k])||0),0);}
function countName(){const n=new Date();const p=n.toLocaleString('he-IL',{timeZone:'Asia/Jerusalem'}).match(/(\d+)\/(\d+)\/(\d+),?\s+(\d+):(\d+)/);if(!p)return'ספירה';const t=parseInt(p[4])*60+parseInt(p[5]);if(t>=9*60&&t<12*60)return'ספירת צהריים';if(t>=14*60+30&&t<17*60)return'ספירת ביטחון';if(t>=19*60&&t<24*60)return'ספירת לילה';if(t>=4*60&&t<7*60+30)return'ספירת בוקר';return'ספירה';}

/* ── TAB ── */
function goTab(t){
  curTab=t;
  const tabs=['wings','generals','log','archive'];
  document.querySelectorAll('.nav-t').forEach((el,i)=>el.classList.toggle('on',tabs[i]===t));
  document.getElementById('tw').style.display=t==='wings'?'':'none';
  document.getElementById('tg').style.display=t==='generals'?'':'none';
  document.getElementById('tl').style.display=t==='log'?'':'none';
  document.getElementById('ta').style.display=t==='archive'?'':'none';
  renderAll();
}

/* ── RENDER ALL ── */
function renderAll(){updateStats();if(curTab==='wings')renderWings();if(curTab==='generals')renderGens();if(curTab==='log')renderLog();if(curTab==='archive')renderArc();}

/* ── STATS ── */
function updateStats(){
  const tot=totAll()+totGen();
  const done=WINGS.filter(w=>(D.wings[w.id]||{}).done).length;
  document.getElementById('st0').textContent=tot;
  document.getElementById('st1').textContent=done+'/'+WINGS.length;
  document.getElementById('st2').textContent=totGen();
  document.getElementById('st3').textContent=Array.isArray(LOG)?LOG.length:0;
  const dot=document.getElementById('ldot');
  if(D.activeStart){dot.classList.remove('off');document.getElementById('countLbl').textContent=countName()+' — פעילה';}
  else{dot.classList.add('off');document.getElementById('countLbl').textContent='אין ספירה פעילה';}
}

/* ── WINGS ── */
function renderWings(){
  const el=document.getElementById('tw');
  const hasAny=D.activeStart||WINGS.some(w=>wt(w.id)>0);
  if(!hasAny){
    el.innerHTML=`<div class="no-count">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <div class="no-count-title">אין ספירה פעילה</div>
      <div class="no-count-sub">ברגע שסוהר יתחיל ספירה הנתונים יופיעו כאן בזמן אמת</div>
    </div>`;return;
  }
  let h='<div class="wc-cols"><div class="sh">אגפים</div>';
  WINGS.forEach(w=>{
    const wd=D.wings[w.id]||{};const tot=wt(w.id);const done=!!wd.done;
    const lb=(D.winglocks||{})[w.id]||null;const busy=lb&&lb!==D.operator;
    const ini=lb?lb.trim().split(' ').slice(0,2).map(p=>p[0]).join(''):'';
    let cls='wc';
    if(done)cls+=' done';else if(busy)cls+=' busy';else if(tot>0)cls+=' filled';
    h+=`<div class="${cls}" style="position:relative">
      <div class="busy-bar"><div class="busy-bar-fill"></div></div>
      <div class="wc-main">
        <div class="wc-info">
          <div class="wc-name">${w.name}</div>
          ${busy?`<div class="wc-sub">${lb} — סופר כרגע</div>`:''}
        </div>
        <div class="wc-right">
          <div class="wc-num">${tot}</div>
          <div class="wc-badge">${done?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`:''}</div>
        </div>
      </div>
      ${busy?`<div class="busy-strip">
        <div class="busy-av">${ini}</div>
        <div><span class="busy-nm">${lb}</span><span class="busy-ac"> סופר כרגע</span></div>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`:''}
    </div>`;
  });
  h+='</div>';el.innerHTML=h;
}

/* ── GENERALS ── */
function renderGens(){
  const el=document.getElementById('tg');
  const allG=[...GENERALS,...(D.customGenerals||[])];
  let h='<div class="sh">מקומות ציבוריים</div>';
  allG.forEach(g=>{
    const v=parseInt((D.general||{})[g])||0;
    h+=`<div class="gr${v>0?' has-val':''}"><div class="gr-name">${g}</div><div class="gr-num">${v}</div></div>`;
  });
  el.innerHTML=h;
}

/* ── LOG ── */
function renderLog(){
  const el=document.getElementById('tl');
  const log=Array.isArray(LOG)?[...LOG].reverse():[];
  if(!log.length){el.innerHTML=`<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><div class="empty-title">הלוג ריק</div><div class="empty-sub">כל שינוי שיתבצע יופיע כאן</div></div>`;return;}
  el.innerHTML='<div class="sh">לוג שינויים</div>'+log.map(e=>`<div class="li"><div class="li-who">${e.who||'—'}</div><div class="li-what">${e.what||''}</div><div class="li-when">${e.time||''}</div></div>`).join('');
}

/* ── ARCHIVE ── */
function renderArc(){
  const el=document.getElementById('ta');
  if(!Array.isArray(ARC)||!ARC.length){el.innerHTML=`<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><div class="empty-title">הארכיון ריק</div><div class="empty-sub">ספירות שמורות יופיעו כאן</div></div>`;return;}
  const items=[...ARC].reverse();
  el.innerHTML='<div class="sh">ארכיון ספירות</div>'+items.map((e,i)=>`
    <div class="arc" onclick="this.classList.toggle('open')">
      <div class="arc-head">
        <div class="arc-name">${e.countName||'ספירה'}</div>
        <div class="arc-total">${e.total}</div>
      </div>
      <div class="arc-meta">
        <div class="arc-m"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.ts}</div>
        <div class="arc-m"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${e.operator||'—'}</div>
        <div class="arc-m"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${e.done}/${(e.wings||[]).length}</div>
      </div>
      <div class="arc-body">${(e.wings||[]).map(w=>`<div class="aw${w.done?' done-w':''}"><span>${w.done?'✓ ':''} ${w.name}</span><span class="aw-num">${w.total}</span></div>`).join('')}</div>
    </div>`).join('');
}

/* ── PRESENCE ── */
function renderPres(){
  const el=document.getElementById('presPills');
  const users=Object.values(PRES||{}).filter(Boolean);
  if(!users.length){el.innerHTML='<span style="font-size:10px;color:var(--dim);font-weight:700">אין מחוברים</span>';return;}
  el.innerHTML=users.map(u=>{
    const me=u.name===cmdName&&u.commander;
    const cmd=u.commander;
    return`<div class="pres-pill${me?' me':cmd?' cmd':''}"><div class="pres-dot"></div>${u.name}${cmd?' (מפקד)':''}</div>`;
  }).join('');
}

/* ── ALERT ── */
function openAlert(){document.getElementById('alertDrawer').classList.add('open');document.getElementById('alertTa').focus();}
function closeAlert(){document.getElementById('alertDrawer').classList.remove('open');document.getElementById('alertTa').value='';}
function sendAlert(){
  const msg=document.getElementById('alertTa').value.trim();
  if(!msg)return;
  db.ref('commanderAlert').set({text:msg,from:cmdName,ts:new Date().toLocaleTimeString('he-IL',{timeZone:'Asia/Jerusalem',hour:'2-digit',minute:'2-digit'}),id:Date.now()});
  closeAlert();
}

window.addEventListener('beforeunload',()=>{if(isVis)removePresence();});
</script>
</body>
</html>
